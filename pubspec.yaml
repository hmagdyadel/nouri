name: agpeya
description: "Agpeya - Coptic Orthodox prayer app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_bloc: ^8.1.3
  dio: ^5.4.0
  retrofit: ^4.1.0
  get_it: ^7.6.7
  injectable: ^2.3.2
  go_router: ^13.2.0
  google_fonts: ^6.2.1
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.8
  cloud_firestore: ^4.15.8
  firebase_storage: ^11.6.9
  firebase_messaging: ^14.7.19
  cloud_functions: ^4.7.6
  flutter_local_notifications: ^17.0.0
  just_audio: ^0.9.36
  audio_session: ^0.1.18
  screenshot: ^2.1.0
  share_plus: ^7.2.2
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  shared_preferences: ^2.2.2
  html: ^0.15.4
  intl: ^0.20.2
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.0
  equatable: ^2.0.5
  dartz: ^0.10.1
  json_annotation: ^4.9.0
  connectivity_plus: ^6.0.2
  image_picker: ^1.0.7
  timezone: ^0.9.4
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  injectable_generator: ^2.4.1
  build_runner: ^2.4.8
  json_serializable: ^6.7.1
  hive_generator: ^2.0.1
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#0D1B2A"
  adaptive_icon_foreground: "assets/images/app_icon_fg.png"

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/
    - assets/lottie/
    - assets/data/
    - assets/agpeya/agpeya_ar.json
    - assets/agpeya/agpeya_en.json
    - assets/agpeya/agpeya_cop.json
    - assets/bible/bible_ar.json
    - assets/bible/bible_en.json

